name: Flight Price Check

on:
  schedule:
    - cron: '0 * * * *'        # every hour
  workflow_dispatch:            # manual "Run workflow" button
  push:
    branches: [main]
    paths-ignore: ['data/**']   # ignore price-history commits to avoid loops

# Serialize all runs so cron / manual / push triggers can't race each other
# on the git push-back. cancel-in-progress: false = let the running job finish.
concurrency:
  group: flight-price-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10         # guard against a hung API call burning minutes
    permissions:
      contents: write           # needed to commit price history back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Shallow clone is enough for commit/push; avoids ever-growing fetch cost.
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price check
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python check_prices.py

      - name: Commit updated price history
        run: |
          set -euo pipefail
          git config user.name  "flight-alert-bot"
          git config user.email "bot@users.noreply.github.com"

          # Stage only files that exist — alerts_sent.json isn't created
          # until the first alert fires, and `git add` on a missing path
          # exits 128 under `set -e`.
          for f in data/prices.json data/alerts_sent.json; do
            [ -f "$f" ] && git add "$f"
          done

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: price history update [skip ci]"

          # Retry pull --rebase + push to survive transient races / rejections.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying..."
            sleep $((RANDOM % 5 + 2))
          done

          echo "::error::Failed to push price history after 5 attempts."
          exit 1

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          MSG="⚠️ Flight Price Check workflow failed%0Arun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}"
