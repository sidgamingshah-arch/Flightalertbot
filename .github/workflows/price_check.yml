name: Flight Price Check

on:
  schedule:
    - cron: '0 * * * *'      # every hour
  workflow_dispatch:           # allows manual "Run workflow" button in GitHub UI
  push:
    branches: [main]
    paths-ignore: ['data/**']  # ignore price history commits to avoid loops

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit price history back to repo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price check
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python check_prices.py

      - name: Commit updated price history
        run: |
          git config user.name  "flight-alert-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/prices.json data/alerts_sent.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: price history update [skip ci]"
          git pull --rebase origin main
          git push
